<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FSA Copilot</title>
  <link rel="stylesheet" href="styles/app.css" />
  <!-- marked.js for markdown rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"
          integrity="sha512-rfX4p3RNnRpYScBKONdMPg5AKkFGWQpazrfaAMNJPWGrF8kBblqTXJ36dFCKhFEMvbBpQ5HKZzNHOGEMBwSmA=="
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- DOMPurify for XSS sanitisation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"
          integrity="sha512-H+rglffZ6f5gF7UJgvH4Naa+fGCgjrHKMgoFOGmcPTRwR6oILo5R+gtzNrpDp7iMV3udbymBVjkeZGNz1Em6A=="
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="header-title">FSA Copilot</span>
        <span class="header-sub">SAI Platform Support</span>
      </div>
      <button class="btn-reset" id="reset-btn" title="Start new session">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13.65 2.35A8 8 0 1 0 15 8h-1.5A6.5 6.5 0 1 1 8 1.5a6.46 6.46 0 0 1 4.6 1.9L10 6h5V1l-1.35 1.35Z" fill="currentColor"/>
        </svg>
        New session
      </button>
    </header>

    <!-- Session info -->
    <div class="session-bar" id="session-bar">Session: initialising...</div>

    <!-- Message thread -->
    <div class="thread" id="thread">
      <div class="empty-state" id="empty-state">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="30" height="22" rx="4" fill="#D5E4F0"/>
          <path d="M3 21l7 7V21H3Z" fill="#D5E4F0"/>
          <rect x="9" y="10" width="18" height="2" rx="1" fill="#1F5C99"/>
          <rect x="9" y="15" width="12" height="2" rx="1" fill="#2D7DD2"/>
        </svg>
        <p>Paste the customer's question<br>to get a draft response.</p>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-row">
        <textarea
          id="query-input"
          rows="1"
          placeholder="Paste the customer's question or describe what you need..."
        ></textarea>
        <button id="send-btn" disabled title="Send">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 10L18 2L11 18L9 11L2 10Z" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
    </div>

  </div>

  <script src="https://static.freshdev.io/fdk/2.0/assets/fresh_client.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
