name: Property Alert

on:
  schedule:
    # 8am UTC = 9am BST (summer) / 8am GMT (winter) — Tuesday and Friday
    - cron: "0 8 * * 2,5"
  workflow_dispatch:
    inputs:
      all_listings:
        description: "Include all current matches (not just new listings)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  send-alert:
    name: Search and email property digest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run property alert
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.all_listings }}" = "true" ]; then
            ARGS="--all"
          fi
          uv run python scripts/property_alert.py $ARGS
